name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Run Unit Tests
        run: yarn test:ci

      - name: Build Next.js App
        run: yarn build
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # Deploy ke Cloudflare Workers dilakukan via Cloudflare Pages GitHub Integration.
  # Setup di: Cloudflare Dashboard > Workers & Pages > Project > Settings > Build
  # Build settings:
  #   Framework preset: Next.js
  #   Build command:    yarn deploy
  #   Deploy command:   (kosongkan)
  #   Environment var:  GROQ_API_KEY = <your key>
  #
  # "yarn deploy" = opennextjs-cloudflare build && opennextjs-cloudflare deploy

