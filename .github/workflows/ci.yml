name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci || npm install # fallback to install if package-lock is missing

      - name: Run Unit Tests
        run: npm run test:ci

      - name: Build Project
        run: npm run build

  # Note: If your project is connected to Vercel via GitHub integration, 
  # Vercel will automatically deploy when changes are pushed to main/master.
  # The tests and build steps above ensure code quality before it merges.
  # 
  # If you want GitHub Actions to manually trigger Vercel deployments, 
  # you would need to set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID 
  # in your GitHub repository secrets and use an action like `amondnet/vercel-action`.
