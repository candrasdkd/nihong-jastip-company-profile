name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Unit Tests
        run: npm run test:ci

      - name: Build Next.js App
        run: npm run build
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # Deploy ke Cloudflare Pages dilakukan OTOMATIS via Cloudflare Pages GitHub Integration.
  # Setup di: Cloudflare Dashboard > Pages > Create Project > Connect GitHub Repo
  # Build settings di Cloudflare Dashboard:
  #   Framework preset: Next.js
  #   Build command:    npm run build
  #   Build output:    .next (atau gunakan OpenNext jika sudah support Next.js 16)
  #   Environment var:  GROQ_API_KEY = <your key>
